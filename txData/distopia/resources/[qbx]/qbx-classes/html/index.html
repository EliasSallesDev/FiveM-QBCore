<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Distopia Classes</title>
    <link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <aside id="ability-widget" class="ability-widget is-hidden" aria-label="Habilidade ativa">
      <div class="ability-widget__key" id="ability-hotkey">H</div>
      <div class="ability-widget__body">
        <span class="ability-widget__label" id="ability-widget-label">Habilidade</span>
        <strong id="ability-widget-state">Carregando</strong>
        <div class="ability-widget__track"><span id="ability-widget-fill"></span></div>
      </div>
      <span class="ability-widget__time" id="ability-widget-time">--</span>
    </aside>

    <main id="app" class="hud" aria-hidden="true">
      <section class="shell" aria-label="Classes de Distopia">
        <header class="topbar">
          <div class="brand">
            <img class="brand-logo" src="assets/brand/logo.svg" alt="" />
            <div>
              <strong>Distopia</strong>
              <span>Classes</span>
            </div>
          </div>
          <nav class="tabs" aria-label="Navegacao">
            <button class="tab is-active" data-tab="classes" type="button">Classes</button>
            <button class="tab" data-tab="abilities" type="button">Habilidades</button>
          </nav>
          <button class="icon-button" id="close" type="button" title="Fechar" aria-label="Fechar">x</button>
        </header>

        <section class="status-band">
          <div>
            <span class="label">Classe atual</span>
            <h1 id="active-name">Sobrevivente</h1>
            <p id="active-role">Utilidade / resistencia</p>
          </div>
          <div class="level-block">
            <span class="label">Nivel</span>
            <strong id="active-level">1</strong>
          </div>
          <div class="xp-block">
            <div class="xp-meta">
              <span id="xp-label">0 / 90 XP</span>
              <span id="cost-label">Primeira escolha gratuita</span>
            </div>
            <div class="xp-track"><span id="xp-fill"></span></div>
          </div>
        </section>

        <section class="content">
          <aside class="class-list" id="class-list" aria-label="Lista de classes"></aside>

          <section class="detail" id="classes-panel">
            <div class="detail-header">
              <div>
                <span class="label">Selecionada</span>
                <h2 id="detail-name">Classe</h2>
              </div>
              <span class="pill" id="detail-state">Disponivel</span>
            </div>

            <p class="detail-copy" id="detail-role"></p>

            <div class="stats-grid" id="stats-grid"></div>

            <div class="ability-strip">
              <span class="label">Habilidade inicial</span>
              <strong id="detail-ability">-</strong>
              <span id="detail-ability-meta">-</span>
            </div>

            <div class="actions">
              <button class="primary-button" id="select-class" type="button">Selecionar</button>
              <button class="ghost-button" id="refresh" type="button">Atualizar</button>
            </div>
          </section>

          <section class="detail is-hidden" id="abilities-panel">
            <div class="detail-header">
              <div>
                <span class="label">Classe atual</span>
                <h2 id="ability-class-name">Habilidades</h2>
              </div>
              <span class="pill" id="ability-count">0</span>
            </div>
            <div class="ability-list" id="ability-list"></div>
          </section>
        </section>

        <footer class="footer">
          <span id="message"></span>
        </footer>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
